program: pqn.py
method: grid
command:
  - ${env}
  - python3
  - ${program}
  - ${args_no_boolean_flags}
parameters:
  env_name:
    values: ["Craftax-Classic-Symbolic-v1", "Craftax-Symbolic-v1"]
  total_timesteps:
    value: 1e9
  seed:
    values: [0, 1]
  her_mode:
    values: ["none"]
  save_policy:
    value: true
  test_during_training:
    value: false